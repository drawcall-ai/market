name: Deploy

on:
  push:
    branches: [main]
    tags: ['*']

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @drawcall/market typecheck
      - run: pnpm --filter @market/db typecheck
      - run: pnpm --filter @market/api typecheck
      - run: pnpm --filter @market/web typecheck

  deploy-api:
    name: Deploy API (Workers)
    needs: typecheck
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @market/api run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f9603af4549c04d25bdbbc04fd5ea112

  deploy-web:
    name: Deploy Web (Pages)
    needs: typecheck
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @market/web build
        env:
          VITE_API_URL: https://api.market.drawcall.ai
      - run: npx wrangler@3 pages deploy packages/web/dist --project-name=market-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: f9603af4549c04d25bdbbc04fd5ea112

  publish-market:
    name: Publish @drawcall/market (npm)
    needs: typecheck
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@11.9.0
      - uses: gittools/actions/gitversion/setup@v0
        with:
          versionSpec: '5.x'
      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @drawcall/market build
      - name: Set version
        run: npm --prefix packages/market version ${{ steps.gitversion.outputs.fullSemVer }} --no-git-tag-version --allow-same-version
      - run: pnpm --filter @drawcall/market publish --access public --no-git-checks --tag latest
        env:
          NPM_CONFIG_PROVENANCE: true
