name = "market-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.market.drawcall.ai", custom_domain = true }
]

[vars]
BETTER_AUTH_URL = "https://api.market.drawcall.ai"

[[d1_databases]]
binding = "DB"
database_name = "market-db"
database_id = "69df7470-6e63-46f8-9e91-c6161015e19d"

[[r2_buckets]]
binding = "R2"
bucket_name = "market-assets"

[[vectorize]]
binding = "VECTORIZE"
index_name = "market-assets"
